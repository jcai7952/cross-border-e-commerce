server:
  port: 9601

spring:
  application:
    name: shop-user
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13307}/shop_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16380}
  messages:
    basename: i18n/messages
  # 仅当 MAIL_HOST 注入时真实发信；默认 shop.mail.mock=true 走控制台
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

sa-token:
  token-name: satoken
  timeout: 604800
  is-print: false

shop:
  mail:
    mock: true
  identity:
    aes-key: ${IDENTITY_AES_KEY:kinn-shop-dev-16}

knife4j:
  enable: true

dubbo:
  application:
    name: shop-user
    qos-enable: false
  protocol:
    name: dubbo
    port: 20881
  registry:
    address: nacos://${NACOS_HOST:localhost}:${NACOS_PORT:8950}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MBP_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}

logging:
  level:
    com.kinn.shop: info
