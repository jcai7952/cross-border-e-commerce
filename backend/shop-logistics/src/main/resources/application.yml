server:
  port: 9605

spring:
  application:
    name: shop-logistics
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13307}/shop_logistics?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16380}
  messages:
    basename: i18n/messages

dubbo:
  application:
    name: shop-logistics
    qos-enable: false
  protocol:
    name: dubbo
    port: 20885
  registry:
    address: nacos://${NACOS_HOST:localhost}:${NACOS_PORT:8950}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MBP_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}

knife4j:
  enable: true

shop:
  logistics:
    # 轨迹推进 Job 间隔（毫秒），演示时调小可加速整链路履约
    advance-interval-ms: 30000

logging:
  level:
    com.kinn.shop: info
