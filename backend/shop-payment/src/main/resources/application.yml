server:
  port: 9604

spring:
  application:
    name: shop-payment
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13307}/shop_payment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16380}
  messages:
    basename: i18n/messages

dubbo:
  application:
    name: shop-payment
    qos-enable: false
  protocol:
    name: dubbo
    port: 20884
  registry:
    address: nacos://${NACOS_HOST:localhost}:${NACOS_PORT:8950}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MBP_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}

knife4j:
  enable: true

shop:
  pay:
    return-base: ${PAY_RETURN_BASE:http://localhost:5183}   # 支付完成后跳回商城前端的基地址
    api-base: ${PAY_API_BASE:http://localhost:9600}          # 网关地址(回调/跳转用)
    stripe:
      enabled: ${STRIPE_ENABLED:false}
      api-key: ${STRIPE_API_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    paypal:
      enabled: ${PAYPAL_ENABLED:false}
      client-id: ${PAYPAL_CLIENT_ID:}
      client-secret: ${PAYPAL_CLIENT_SECRET:}
      base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}

logging:
  level:
    com.kinn.shop: info
